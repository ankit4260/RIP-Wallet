<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="form-box login">
        <form action="" method="">
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" id="log-username" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" id="log-password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="forget-pass">
                <a href="">Forget Passward</a>
            </div>
            <button class="btn  submitLogin">Login</button>
        </form>
        </div>

        <div class="form-box register">
        <form action="" method="">
            <h1>Register</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" id="reg-username"  required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email"  id="reg-email" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" id="reg-password"  required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <button class="btn submitRegister">Register</button>
        </form>
        </div>
        <div class="toggle-box">
            <div class="toggle-pannel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>
            <div class="toggle-pannel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>
<script>
    const container=document.querySelector(".container");
    const regBtn=document.querySelector(".register-btn");
    const logBtn=document.querySelector(".login-btn");
    regBtn.addEventListener('click',()=>{
        container.classList.add('active');
    })
    logBtn.addEventListener('click',()=>{
        container.classList.remove('active');
    })

    document.querySelector(".submitRegister").addEventListener("click",async()=>{
        const username=document.querySelector("#reg-username").value;
        const email=document.querySelector("#reg-email").value;
        const password=document.querySelector("#reg-password").value;

        const registerResponse=await fetch("/auth/register",{
            method:"post",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                email,
                password
            })
        })
        const jRegisterResponse=await registerResponse.json();
        if(jRegisterResponse.msg=="success"){
            container.classList.remove('active');
            return;
        }
    })

    document.querySelector(".submitLogin").addEventListener("click",async()=>{
        const username=document.querySelector("#log-username").value;
        const password=document.querySelector("#log-password").value;

        const registerResponse=await fetch("/auth/login",{
            method:"post",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                password
            })
        })
        const jRegisterResponse=await registerResponse.json();
        if(jRegisterResponse.msg=="success"){
            localStorage.setItem("token",jRegisterResponse.token);
            window.location.href="dashboard.html";
            return;
        }
    })


</script>
</body>
</html>
